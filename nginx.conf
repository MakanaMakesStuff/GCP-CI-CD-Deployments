events {}

http {
    upstream my_app {
        # Docker's internal DNS resolves 'app' to all running replicas
        server app:3000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://my_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}