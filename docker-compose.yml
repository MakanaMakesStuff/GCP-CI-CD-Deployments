services:
  app:
    image: ${DOCKER_USERNAME}/${DEPLOY_TYPE}:${DEPLOY_TAG}
    restart: always
    deploy:
      replicas: 3
    environment:
      - PORT=3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s # check every 10 seconds
      timeout: 5s # give up check if no response in 5 seconds
      retries: 3  # only allow test to fail up to 3 times before marking container as unhealthy
      start_period: 20s # give the container time to breathe before checking health
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy