services:
  app:
    image: ${DOCKER_USERNAME}/${DOCKER_TYPE}:${DOCKER_TAG}
    restart: always
    deploy:
      replicas: 3
    environment:
      - PORT=3000
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app